<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Which Cashback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260418" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy-block">
          <p class="eyebrow">Static card reference</p>
          <div class="hero-inline">
            <h1>Which Cashback</h1>
            <p class="hero-copy">
              Compare cards and open one for current rewards in a tap.
            </p>
          </div>
        </div>
      </header>

      <main id="app" class="app-shell" aria-live="polite">
        <section class="panel loading-panel">
          <p>Loading card data...</p>
        </section>
      </main>
    </div>

    <template id="list-template">
      <section class="panel">
        <div class="section-heading">
          <div>
            <h2>Available Cards</h2>
          </div>
          <p class="section-copy" data-list-summary>
            Select a card to see its cashback details.
          </p>
        </div>
        <div class="card-grid" data-card-list></div>
      </section>
    </template>

    <template id="detail-template">
      <section class="panel detail-panel">
        <div class="detail-header">
          <a href="#/" class="back-link" aria-label="Back to cards overview">
            <span class="back-link-icon" aria-hidden="true">&larr;</span>
            <span>Back to cards</span>
          </a>
          <div>
            <p class="section-kicker" data-issuer></p>
            <h2 data-card-name></h2>
            <p class="detail-copy" data-card-summary></p>
          </div>
        </div>

        <div class="detail-overview" aria-label="Card overview">
          <article class="overview-card">
            <p class="overview-label">Reward model</p>
            <p class="overview-value" data-reward-model></p>
          </article>
          <article class="overview-card">
            <p class="overview-label">Base rate</p>
            <p class="overview-value" data-base-highlight></p>
          </article>
          <article class="overview-card">
            <p class="overview-label">Best fit</p>
            <p class="overview-value" data-top-category></p>
          </article>
        </div>

        <div class="detail-grid">
          <article class="detail-section">
            <h3>Base Rates</h3>
            <ul class="tag-list" data-base-rates></ul>
          </article>

          <article class="detail-section">
            <h3>Permanent Categories</h3>
            <ul class="tag-list" data-permanent-categories></ul>
          </article>

          <article class="detail-section detail-section-wide">
            <div class="rotating-header">
              <h3>Rotating Categories</h3>
              <span class="status-pill" data-rotating-status></span>
            </div>
            <div data-rotating-content></div>
          </article>
        </div>
      </section>
    </template>

    <script type="module" src="app.js?v=20260418"></script>
  </body>
</html>
